<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Users' Conversations</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f8fa;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13px;
      color: #33475b;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #fff;
      border-bottom: 1px solid #e5e8eb;
    }
    .header-title {
      font-weight: 700;
      font-size: 13px;
      color: #33475b;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #7c98b6;
    }
    .header-actions span {
      cursor: pointer;
      font-size: 15px;
    }
    .date-filter {
      font-size: 12px;
      color: #33475b;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      font-weight: 500;
    }

    /* ── Message Thread ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f5f8fa;
    }

    .message-row {
      display: flex;
      flex-direction: column;
    }
    .message-row.outbound {
      align-items: flex-end;
    }
    .message-row.inbound {
      align-items: flex-start;
    }

    .bubble-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }
    .outbound .bubble-wrap {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #00bda5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .avatar.outbound-avatar {
      background: #0091ae;
    }

    .bubble {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12.5px;
      line-height: 1.45;
      word-break: break-word;
    }
    .outbound .bubble {
      background: #0091ae;
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .inbound .bubble {
      background: #fff;
      color: #33475b;
      border: 1px solid #e5e8eb;
      border-bottom-left-radius: 3px;
    }

    .meta {
      font-size: 10.5px;
      color: #7c98b6;
      margin-top: 3px;
      padding: 0 30px;
    }
    .outbound .meta {
      text-align: right;
    }
    .inbound .meta {
      text-align: left;
    }

    /* ── Channel Tabs ── */
    .channels-bar {
      background: #fff;
      border-top: 1px solid #e5e8eb;
      border-bottom: 1px solid #e5e8eb;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .channels-bar::-webkit-scrollbar { display: none; }

    .ch-tab {
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11.5px;
      cursor: pointer;
      white-space: nowrap;
      color: #516f90;
      background: transparent;
      border: none;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.15s;
    }
    .ch-tab:hover { color: #0091ae; }
    .ch-tab.active {
      color: #0091ae;
      font-weight: 700;
      border-bottom: 2px solid #0091ae;
    }

    /* ── Input Area ── */
    .input-area {
      background: #fff;
      padding: 8px 10px;
      border-top: 1px solid #e5e8eb;
    }

    .message-input {
      width: 100%;
      border: 1px solid #cbd6e2;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 12.5px;
      font-family: inherit;
      resize: none;
      outline: none;
      color: #33475b;
      background: #fff;
      min-height: 60px;
      transition: border-color 0.15s;
    }
    .message-input:focus { border-color: #0091ae; }
    .message-input::placeholder { color: #b0c1d4; }

    .input-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .toolbar-left {
      display: flex;
      gap: 8px;
      color: #7c98b6;
    }
    .toolbar-icon {
      cursor: pointer;
      font-size: 15px;
      transition: color 0.15s;
    }
    .toolbar-icon:hover { color: #0091ae; }

    .char-count {
      font-size: 11px;
      color: #7c98b6;
    }

    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #0091ae;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #007a94; }
    .send-btn:disabled { background: #cbd6e2; cursor: not-allowed; }
    .send-btn svg {
      width: 14px;
      height: 14px;
      fill: #fff;
    }

    /* ── Footer (To / From) ── */
    .footer {
      background: #fff;
      border-top: 1px solid #e5e8eb;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-field {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #516f90;
    }
    .footer-select {
      border: none;
      font-size: 12px;
      font-family: inherit;
      color: #33475b;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      outline: none;
      padding: 2px 4px;
    }
    .footer-label {
      color: #7c98b6;
      font-size: 11.5px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-title">All Users&#39; Conversations</span>
    <div class="header-actions">
      <span class="date-filter">Yesterday ▾</span>
      <span title="Filter">&#9906;</span>
      <span title="Refresh">&#8635;</span>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messagesArea">

    <div class="message-row outbound">
      <div class="bubble-wrap">
        <div class="avatar outbound-avatar">i</div>
        <div class="bubble">hi sky connect with me +917805947337 hello check</div>
      </div>
      <div class="meta">By: User User &nbsp; 03:14 PM</div>
    </div>

    <div class="message-row outbound">
      <div class="bubble-wrap">
        <div class="avatar outbound-avatar">i</div>
        <div class="bubble">hi sky connect with me +917805947337</div>
      </div>
      <div class="meta">By: User User &nbsp; 04:53 PM</div>
    </div>

  </div>

  <!-- Channel Tabs -->
  <div class="channels-bar" id="channelsBar">
    <button class="ch-tab active" onclick="selectChannel(this, 'SMS/MMS')">SMS/MMS</button>
    <button class="ch-tab" onclick="selectChannel(this, 'WhatsApp')">WhatsApp</button>
    <button class="ch-tab" onclick="selectChannel(this, 'Line')">Line</button>
    <button class="ch-tab" onclick="selectChannel(this, 'Facebook')">Facebook</button>
    <button class="ch-tab" onclick="selectChannel(this, 'Instagram')">Instagram</button>
    <button class="ch-tab" onclick="selectChannel(this, 'Viber')">Viber</button>
    <button class="ch-tab" onclick="selectChannel(this, 'Voicemail')">Voicemail</button>
    <button class="ch-tab" onclick="selectChannel(this, 'KakaoTalk')">KakaoTalk</button>
    <button class="ch-tab" onclick="selectChannel(this, 'WeChat')">WeChat</button>
    <button class="ch-tab" onclick="selectChannel(this, 'WhatsApp Personal')">WhatsApp Personal</button>
    <button class="ch-tab" onclick="selectChannel(this, 'WebChat')">WebChat</button>
    <button class="ch-tab" onclick="selectChannel(this, 'LinkedIn')">LinkedIn</button>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <textarea
      class="message-input"
      id="messageInput"
      placeholder="Message..."
      maxlength="1000"
      oninput="updateCount()"
      onkeydown="handleKey(event)"
    ></textarea>

    <div class="input-toolbar">
      <div class="toolbar-left">
        <span class="toolbar-icon" title="Emoji">&#128578;</span>
        <span class="toolbar-icon" title="Attach">&#128206;</span>
        <span class="toolbar-icon" title="Template">&#128203;</span>
        <span class="toolbar-icon" title="Format">&#9000;</span>
        <span class="toolbar-icon" title="Audio">&#127908;</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="char-count" id="charCount">0/1000: 0 SMS</span>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-field">
      <span class="footer-label">To:</span>
      <select class="footer-select" id="toField">
        <option>Mobile Phone</option>
        <option>Phone</option>
        <option>WhatsApp Number</option>
      </select>
    </div>
    <div class="footer-field">
      <span class="footer-label">From:</span>
      <select class="footer-select" id="fromField">
        <option>(510) 892-3370</option>
        <option>(415) 222-1100</option>
      </select>
    </div>
  </div>

  <script>
    let activeChannel = "SMS/MMS";

    function selectChannel(btn, channel) {
      document.querySelectorAll(".ch-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeChannel = channel;
      updateCount();
    }

    function updateCount() {
      const input = document.getElementById("messageInput");
      const len = input.value.length;
      const smsCount = activeChannel === "SMS/MMS" ? Math.ceil(len / 160) || 0 : null;
      const countEl = document.getElementById("charCount");
      countEl.textContent = smsCount !== null
        ? `${len}/1000: ${smsCount} SMS`
        : `${len}/1000`;
      document.getElementById("sendBtn").disabled = len === 0;
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (!text) return;

      const time = new Date().toLocaleTimeString([], {
        hour: "2-digit", minute: "2-digit"
      });

      const row = document.createElement("div");
      row.className = "message-row outbound";
      row.innerHTML = `
        <div class="bubble-wrap">
          <div class="avatar outbound-avatar">i</div>
          <div class="bubble">${escapeHtml(text)}</div>
        </div>
        <div class="meta">By: Current User &nbsp; ${time}</div>
      `;

      const area = document.getElementById("messagesArea");
      area.appendChild(row);
      area.scrollTop = area.scrollHeight;

      input.value = "";
      updateCount();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>

</body>
</html>
